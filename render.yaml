# Render Blueprint — SettlementOS Explorer (Node web + MCP)
# Dashboard: New → Blueprint → connect this repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: settlementos-explorer
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_ETHERSCAN_API_KEY
        sync: false
      - key: MCP_API_KEY
        sync: false
      - key: MCP_OAUTH_CLIENT_ID
        sync: false
      - key: MCP_OAUTH_CLIENT_SECRET
        sync: false
      - key: MCP_PUBLIC_URL
        sync: false
